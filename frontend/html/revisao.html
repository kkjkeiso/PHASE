<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHASE — Revisão e Histórico</title>
  <meta name="description" content="PHASE — Acompanhe seu progresso e revise conteúdos" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/app.css" />
  <script src="../js/early-auth.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="main-header">
        <div class="main-header__title reveal">
          <h1>Revisão e Histórico</h1>
          <p>Acompanhe seu progresso e revise conteúdos anteriores.</p>
        </div>
      </div>
      <div class="chat-placeholder reveal">
        <div class="chat-placeholder__icon"><i class="fa-solid fa-clock-rotate-left placeholder-icon-lg"></i></div>
        <h3>Seu Histórico</h3>
        <p>Conforme você avança nos módulos, seu histórico de revisão e desempenho aparecerá aqui.</p>
      </div>
    </main>
    <div class="sage-fab reveal" title="Falar com o assistente PHASE" id="fabChat">
      <i class="fa-solid fa-robot"></i>
    </div>
  </div>
  <script src="../js/global.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
